name: Publish to npm

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Bump version above latest published
        run: |
          LATEST=$(npm view signalk-rainviewer-charts version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          HIGHEST=$(echo -e "$LATEST\n$LOCAL" | sort -V | tail -1)
          npm version --no-git-tag-version "$HIGHEST"
          npm version patch --no-git-tag-version
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
